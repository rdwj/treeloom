  - name: json.loads
    aliases: ["loads"]
    propagation:
      params_to_return: [0]
  - name: json.dumps
    aliases: ["dumps"]
    propagation:
      params_to_return: [0]
  - name: json.load
    aliases: ["load"]
    propagation:
      params_to_return: [0]
  - name: json.dump
    aliases: ["dump"]
    propagation:
      params_to_return: [0]

